name: loris_10bt1s_controller
meta:
  author: Dev
  compatible_flync_version: 
    version_schema: semver
    version: 1.0.0
  target_system: Every
  
interfaces:
  - name: loris_10bt1s_controller_iface1
    mac_address: 3c:6d:66:0f:1e:81
    mii_config:
      type: sgmii
      speed: 1000
      mode: mac
    virtual_interfaces:
      - name: vsm
        vlanid: 11
        addresses: 
          - address: 10.0.11.104
            ipv4netmask: 255.255.255.0
        multicast: []        