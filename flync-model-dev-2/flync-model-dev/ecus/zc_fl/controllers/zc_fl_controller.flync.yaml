name: zc_fl_controller
meta:
  author: Dev
  compatible_flync_version: 
    version_schema: semver
    version: 1.0.0
  target_system: Every
  
interfaces:
  - name: zc_fl_controller_iface1
    mac_address: 3c:6d:66:0f:1e:81
    mii_config:
      type: sgmii
      speed: 1000
      mode: mac
    virtual_interfaces:
      - name: vsm
        vlanid: 11
        addresses: 
          - address: 10.0.11.21
            ipv4netmask: 255.255.255.0
        multicast: []        

gateway:
  - type: can_to_eth
    source_bus: FD_CAN_ZC_FL_0
    source_frame_id: 0x00000560
    target_container_id: 0
  - type: can_to_eth
    source_bus: FD_CAN_ZC_FL_1
    source_frame_id: 0x00000401
    target_container_id: 1 
  - type: can_to_eth
    source_bus: FD_CAN_ZC_FL_2
    source_frame_id: 0x00000561
    target_container_id: 0
  - type: can_to_eth
    source_bus: FD_CAN_ZC_FL_3
    source_frame_id: 0x00000102
    target_container_id: 1 
  - type: can_to_eth
    source_bus: FD_CAN_ZC_FL_4
    source_frame_id: 0x00000562
    target_container_id: 0
  - type: can_to_eth
    source_bus: FD_CAN_ZC_FL_5
    source_frame_id: 0x00000563
    target_container_id: 0
  - type: can_to_eth
    source_bus: FD_CAN_ZC_FL_6
    source_frame_id: 0x00000564
    target_container_id: 0
  - type: can_to_eth
    source_bus: FD_CAN_ZC_FL_7
    source_frame_id: 0x00000565
    target_container_id: 0

