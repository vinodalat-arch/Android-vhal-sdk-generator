    name: hpc_vsm_socket
    port_no: 50010 # for DebugAPI change Global State value
    protocol: udp
    udp_options:
      udp_cork: False
    deployments:
      - deployment_type: vsm_consumer
        vsm_consumer_id: 2
        name: "hpc"
        efuse_id: 0 #connected to vbat
        class_id: A
        